<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 520" style="background:#f8f9fa;font-family:system-ui,sans-serif">
  <defs><marker id="a" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto"><polygon points="0 0,10 3.5,0 7" fill="#1976D2"/></marker><marker id="g" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto"><polygon points="0 0,10 3.5,0 7" fill="#388E3C"/></marker></defs>
  <text x="450" y="34" text-anchor="middle" font-size="20" font-weight="700" fill="#0D47A1">Autonomous Agents - Scan, Match, Claim, Execute</text>
  <rect x="330" y="85" width="240" height="100" rx="12" fill="#ECEFF1" stroke="#78909C" stroke-width="2"/>
  <text x="450" y="122" text-anchor="middle" font-size="16" font-weight="700" fill="#455A64">Shared Task Board</text>
  <text x="450" y="150" text-anchor="middle" font-size="12" fill="#546E7A">open tasks + owner + heartbeat</text>
  <g>
    <rect x="65" y="275" width="190" height="105" rx="12" fill="#E3F2FD" stroke="#1976D2" stroke-width="2"/>
    <rect x="355" y="275" width="190" height="105" rx="12" fill="#E8F5E9" stroke="#388E3C" stroke-width="2"/>
    <rect x="645" y="275" width="190" height="105" rx="12" fill="#FFF3E0" stroke="#F57C00" stroke-width="2"/>
  </g>
  <text x="160" y="309" text-anchor="middle" font-size="15" font-weight="700" fill="#1565C0">Agent A</text><text x="160" y="334" text-anchor="middle" font-size="12" fill="#1976D2">skills: backend</text><text x="160" y="357" text-anchor="middle" font-size="12" fill="#1976D2">idle loop 30s</text>
  <text x="450" y="309" text-anchor="middle" font-size="15" font-weight="700" fill="#2E7D32">Agent B</text><text x="450" y="334" text-anchor="middle" font-size="12" fill="#388E3C">skills: frontend</text><text x="450" y="357" text-anchor="middle" font-size="12" fill="#388E3C">claim if match</text>
  <text x="740" y="309" text-anchor="middle" font-size="15" font-weight="700" fill="#E65100">Agent C</text><text x="740" y="334" text-anchor="middle" font-size="12" fill="#F57C00">skills: review</text><text x="740" y="357" text-anchor="middle" font-size="12" fill="#F57C00">heartbeat</text>
  <path d="M160 275 C210 220 325 185 405 185" stroke="#1976D2" fill="none" stroke-width="2.5" marker-end="url(#a)"/>
  <path d="M450 275 L450 190" stroke="#1976D2" fill="none" stroke-width="2.5" marker-end="url(#a)"/>
  <path d="M740 275 C690 220 575 185 495 185" stroke="#1976D2" fill="none" stroke-width="2.5" marker-end="url(#a)"/>
  <path d="M405 185 C285 215 200 245 160 275" stroke="#388E3C" fill="none" stroke-width="2" stroke-dasharray="5,4" marker-end="url(#g)"/>
  <path d="M450 190 L450 270" stroke="#388E3C" fill="none" stroke-width="2" stroke-dasharray="5,4" marker-end="url(#g)"/>
  <path d="M495 185 C615 215 700 245 740 275" stroke="#388E3C" fill="none" stroke-width="2" stroke-dasharray="5,4" marker-end="url(#g)"/>
  <rect x="165" y="430" width="570" height="48" rx="8" fill="#ECEFF1" stroke="#B0BEC5"/>
  <text x="450" y="459" text-anchor="middle" font-size="13" fill="#455A64">If an agent misses heartbeats, its claimed task is released back to the board for another agent.</text>
</svg>
