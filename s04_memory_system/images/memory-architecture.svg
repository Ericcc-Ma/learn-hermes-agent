<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 850 520" style="background:#f8f9fa;font-family:system-ui,sans-serif">
  <defs>
    <marker id="arrowBlue" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#1976D2"/>
    </marker>
    <marker id="arrowGreen" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#388E3C"/>
    </marker>
  </defs>

  <!-- Title -->
  <text x="425" y="32" text-anchor="middle" font-size="18" font-weight="bold" fill="#1565C0">Dual-layer Memory Architecture (双层记忆架构)</text>

  <!-- MemoryManager -->
  <rect x="290" y="55" width="270" height="65" rx="10" fill="#E3F2FD" stroke="#1565C0" stroke-width="3"/>
  <text x="425" y="80" text-anchor="middle" font-size="15" font-weight="bold" fill="#0D47A1">MemoryManager</text>
  <text x="425" y="100" text-anchor="middle" font-size="12" fill="#1565C0">统一调度与编排中心</text>

  <!-- BuiltinProvider -->
  <rect x="50" y="160" width="350" height="180" rx="8" fill="#E8F5E9" stroke="#388E3C" stroke-width="2"/>
  <text x="225" y="185" text-anchor="middle" font-size="14" font-weight="bold" fill="#2E7D32">BuiltinProvider（内置提供者）</text>

  <rect x="70" y="200" width="310" height="40" rx="6" fill="#C8E6C9" stroke="#388E3C" stroke-width="1.5"/>
  <text x="225" y="218" text-anchor="middle" font-size="12" fill="#1B5E20">Storage: SQLite</text>
  <text x="225" y="234" text-anchor="middle" font-size="10" fill="#2E7D32">轻量级关系型数据库</text>

  <rect x="70" y="250" width="310" height="40" rx="6" fill="#C8E6C9" stroke="#388E3C" stroke-width="1.5"/>
  <text x="225" y="268" text-anchor="middle" font-size="12" fill="#1B5E20">Search: FTS5 全文索引</text>
  <text x="225" y="284" text-anchor="middle" font-size="10" fill="#2E7D32">BM25 相关性排序</text>

  <rect x="70" y="300" width="310" height="30" rx="6" fill="#A5D6A7" stroke="#388E3C" stroke-width="1.5"/>
  <text x="225" y="319" text-anchor="middle" font-size="11" fill="#1B5E20">本地优先 / 离线可用 / 无网络依赖</text>

  <!-- ExternalProvider -->
  <rect x="450" y="160" width="370" height="180" rx="8" fill="#E8F5E9" stroke="#388E3C" stroke-width="2"/>
  <text x="635" y="185" text-anchor="middle" font-size="14" font-weight="bold" fill="#2E7D32">ExternalProvider（外部提供者）</text>

  <rect x="470" y="200" width="100" height="35" rx="6" fill="#C8E6C9" stroke="#388E3C" stroke-width="1.5"/>
  <text x="520" y="221" text-anchor="middle" font-size="11" fill="#1B5E20">Honcho</text>

  <rect x="585" y="200" width="100" height="35" rx="6" fill="#C8E6C9" stroke="#388E3C" stroke-width="1.5"/>
  <text x="635" y="221" text-anchor="middle" font-size="11" fill="#1B5E20">Mem0</text>

  <rect x="700" y="200" width="100" height="35" rx="6" fill="#C8E6C9" stroke="#388E3C" stroke-width="1.5"/>
  <text x="750" y="221" text-anchor="middle" font-size="11" fill="#1B5E20">Custom</text>

  <rect x="470" y="250" width="330" height="40" rx="6" fill="#C8E6C9" stroke="#388E3C" stroke-width="1.5"/>
  <text x="635" y="268" text-anchor="middle" font-size="12" fill="#1B5E20">统一接口: store/search/delete/update</text>
  <text x="635" y="284" text-anchor="middle" font-size="10" fill="#2E7D32">Provider 协议抽象层</text>

  <rect x="470" y="300" width="330" height="30" rx="6" fill="#A5D6A7" stroke="#388E3C" stroke-width="1.5"/>
  <text x="635" y="319" text-anchor="middle" font-size="11" fill="#1B5E20">云端 / 多用户 / 跨会话共享</text>

  <!-- Lifecycle Hooks -->
  <rect x="150" y="375" width="550" height="120" rx="8" fill="#E3F2FD" stroke="#1976D2" stroke-width="2"/>
  <text x="425" y="400" text-anchor="middle" font-size="14" font-weight="bold" fill="#1565C0">Lifecycle Hooks（生命周期钩子）</text>

  <rect x="170" y="415" width="110" height="30" rx="5" fill="#BBDEFB" stroke="#1976D2" stroke-width="1"/>
  <text x="225" y="435" text-anchor="middle" font-size="11" fill="#1565C0">on_session_start</text>

  <rect x="295" y="415" width="110" height="30" rx="5" fill="#BBDEFB" stroke="#1976D2" stroke-width="1"/>
  <text x="350" y="435" text-anchor="middle" font-size="11" fill="#1565C0">on_turn_end</text>

  <rect x="420" y="415" width="110" height="30" rx="5" fill="#BBDEFB" stroke="#1976D2" stroke-width="1"/>
  <text x="475" y="435" text-anchor="middle" font-size="11" fill="#1565C0">on_session_end</text>

  <rect x="170" y="455" width="110" height="30" rx="5" fill="#BBDEFB" stroke="#1976D2" stroke-width="1"/>
  <text x="225" y="475" text-anchor="middle" font-size="11" fill="#1565C0">before_llm_call</text>

  <rect x="295" y="455" width="110" height="30" rx="5" fill="#BBDEFB" stroke="#1976D2" stroke-width="1"/>
  <text x="350" y="475" text-anchor="middle" font-size="11" fill="#1565C0">after_llm_call</text>

  <rect x="420" y="455" width="110" height="30" rx="5" fill="#BBDEFB" stroke="#1976D2" stroke-width="1"/>
  <text x="475" y="475" text-anchor="middle" font-size="11" fill="#1565C0">on_error</text>

  <!-- Arrows -->
  <line x1="425" y1="120" x2="225" y2="157" stroke="#1565C0" stroke-width="2" marker-end="url(#arrowBlue)"/>
  <line x1="425" y1="120" x2="635" y2="157" stroke="#1565C0" stroke-width="2" marker-end="url(#arrowBlue)"/>

  <!-- Provider to hooks -->
  <line x1="225" y1="340" x2="300" y2="372" stroke="#1976D2" stroke-width="1.5"/>
  <line x1="635" y1="340" x2="550" y2="372" stroke="#1976D2" stroke-width="1.5"/>

  <!-- Labels -->
  <text x="285" y="145" font-size="10" fill="#1565C0">调度</text>
  <text x="540" y="145" font-size="10" fill="#1565C0">调度</text>

  <!-- Legend -->
  <rect x="100" y="500" width="650" height="10" rx="3" fill="none"/>
</svg>
