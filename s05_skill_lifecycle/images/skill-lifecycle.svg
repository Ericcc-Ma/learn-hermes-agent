<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 850 500" style="background:#f8f9fa;font-family:system-ui,sans-serif">
  <defs>
    <marker id="arrowGreen" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#388E3C"/>
    </marker>
    <marker id="arrowOrange" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#F57C00"/>
    </marker>
    <marker id="arrowGray" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#78909C"/>
    </marker>
    <marker id="arrowBlue" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#1976D2"/>
    </marker>
  </defs>

  <!-- Title -->
  <text x="425" y="32" text-anchor="middle" font-size="18" font-weight="bold" fill="#1565C0">Skill State Machine (技能状态机)</text>

  <!-- Active State -->
  <rect x="50" y="70" width="220" height="130" rx="10" fill="#E8F5E9" stroke="#388E3C" stroke-width="3"/>
  <text x="160" y="100" text-anchor="middle" font-size="16" font-weight="bold" fill="#2E7D32">Active（活跃）</text>
  <text x="160" y="125" text-anchor="middle" font-size="12" fill="#388E3C">技能正常可用</text>
  <text x="160" y="145" text-anchor="middle" font-size="12" fill="#388E3C">在上下文窗口中注入</text>
  <text x="160" y="165" text-anchor="middle" font-size="12" fill="#388E3C">LLM 可直接调用</text>
  <text x="160" y="185" text-anchor="middle" font-size="11" fill="#1B5E20">entry: 创建时 / 从错误学习</text>

  <!-- Stale State -->
  <rect x="340" y="70" width="220" height="130" rx="10" fill="#FFF3E0" stroke="#F57C00" stroke-width="3"/>
  <text x="450" y="100" text-anchor="middle" font-size="16" font-weight="bold" fill="#E65100">Stale（陈旧）</text>
  <text x="450" y="125" text-anchor="middle" font-size="12" fill="#F57C00">未被使用超过阈值</text>
  <text x="450" y="145" text-anchor="middle" font-size="12" fill="#F57C00">仍在上下文中</text>
  <text x="450" y="165" text-anchor="middle" font-size="12" fill="#F57C00">但标记为待清理</text>
  <text x="450" y="185" text-anchor="middle" font-size="11" fill="#E65100">触发: last_used > threshold</text>

  <!-- Archived State -->
  <rect x="630" y="70" width="190" height="130" rx="10" fill="#ECEFF1" stroke="#78909C" stroke-width="3"/>
  <text x="725" y="100" text-anchor="middle" font-size="16" font-weight="bold" fill="#546E7A">Archived（归档）</text>
  <text x="725" y="125" text-anchor="middle" font-size="12" fill="#78909C">从上下文中移除</text>
  <text x="725" y="145" text-anchor="middle" font-size="12" fill="#78909C">存储在数据库中</text>
  <text x="725" y="165" text-anchor="middle" font-size="12" fill="#78909C">保留元数据</text>
  <text x="725" y="185" text-anchor="middle" font-size="11" fill="#546E7A">触发: stale + 超出容量</text>

  <!-- Arrows between states -->
  <path d="M 270,120 L 335,120" stroke="#F57C00" stroke-width="2.5" marker-end="url(#arrowOrange)" fill="none"/>
  <text x="302" y="110" text-anchor="middle" font-size="11" fill="#E65100" font-weight="bold">超时</text>

  <path d="M 560,120 L 625,120" stroke="#78909C" stroke-width="2.5" marker-end="url(#arrowGray)" fill="none"/>
  <text x="592" y="110" text-anchor="middle" font-size="11" fill="#546E7A" font-weight="bold">容量满</text>

  <!-- Reactivation Path (archived -> active) -->
  <path d="M 630,200 L 630,290 L 160,290 L 160,205" stroke="#388E3C" stroke-width="2.5" stroke-dasharray="8,4" fill="none" marker-end="url(#arrowGreen)"/>
  <text x="395" y="310" text-anchor="middle" font-size="12" fill="#2E7D32" font-weight="bold">Reactivation Path（重新激活路径）</text>
  <text x="395" y="328" text-anchor="middle" font-size="11" fill="#388E3C">LLM 通过 search 或用户提及发现归档技能，触发重新激活</text>

  <!-- Pin Exemption -->
  <rect x="180" y="355" width="490" height="70" rx="8" fill="#E3F2FD" stroke="#1565C0" stroke-width="2"/>
  <text x="425" y="380" text-anchor="middle" font-size="14" font-weight="bold" fill="#1565C0">Pin Exemption（钉选豁免）</text>
  <text x="425" y="400" text-anchor="middle" font-size="12" fill="#1976D2">被标记为 pinned 的技能不受状态机控制，始终保持在 active 状态</text>
  <text x="425" y="416" text-anchor="middle" font-size="11" fill="#1565C0">受保护: 手动钉选 / 核心系统技能 / 高频使用</text>

  <!-- Transition Table -->
  <rect x="100" y="440" width="650" height="45" rx="6" fill="#ECEFF1" opacity="0.8"/>
  <text x="425" y="458" text-anchor="middle" font-size="11" fill="#546E7A">Transition Rules: active --[last_used > 7d]--> stale --[total_count > limit]--> archived --[search/mention]--> active</text>
</svg>
