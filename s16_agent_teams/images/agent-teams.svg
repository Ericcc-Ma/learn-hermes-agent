<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 600" style="background:#f8fafc;font-family:system-ui,-apple-system,Segoe UI,sans-serif">
  <defs>
    <marker id="blueArrow" markerWidth="10" markerHeight="8" refX="9" refY="4" orient="auto">
      <polygon points="0 0,10 4,0 8" fill="#2563EB"/>
    </marker>
    <marker id="greenArrow" markerWidth="10" markerHeight="8" refX="9" refY="4" orient="auto">
      <polygon points="0 0,10 4,0 8" fill="#16A34A"/>
    </marker>
  </defs>

  <text x="480" y="38" text-anchor="middle" font-size="22" font-weight="700" fill="#0F172A">Agent Teams - delegate_task + Role System</text>
  <text x="480" y="64" text-anchor="middle" font-size="13" fill="#475569">The LLM decides when to call delegate_task; the harness controls roles, depth, and concurrency.</text>

  <rect x="330" y="96" width="300" height="96" rx="10" fill="#1D4ED8" stroke="#1E3A8A" stroke-width="2"/>
  <text x="480" y="130" text-anchor="middle" font-size="17" font-weight="700" fill="#FFFFFF">Parent Agent</text>
  <text x="480" y="154" text-anchor="middle" font-size="12" fill="#DBEAFE">LLM calls delegate_task as a tool</text>
  <text x="480" y="174" text-anchor="middle" font-size="12" fill="#DBEAFE">waits for child summaries</text>

  <rect x="92" y="282" width="214" height="118" rx="10" fill="#E0F2FE" stroke="#0284C7" stroke-width="2"/>
  <text x="199" y="314" text-anchor="middle" font-size="16" font-weight="700" fill="#075985">leaf worker</text>
  <text x="199" y="338" text-anchor="middle" font-size="12" fill="#0369A1">role = leaf (default)</text>
  <text x="199" y="361" text-anchor="middle" font-size="12" fill="#0369A1">no delegate_task</text>
  <text x="199" y="382" text-anchor="middle" font-size="12" fill="#0369A1">isolated child context</text>

  <rect x="373" y="282" width="214" height="118" rx="10" fill="#ECFDF5" stroke="#16A34A" stroke-width="2"/>
  <text x="480" y="314" text-anchor="middle" font-size="16" font-weight="700" fill="#166534">leaf worker</text>
  <text x="480" y="338" text-anchor="middle" font-size="12" fill="#15803D">single task execution</text>
  <text x="480" y="361" text-anchor="middle" font-size="12" fill="#15803D">summary returned</text>
  <text x="480" y="382" text-anchor="middle" font-size="12" fill="#15803D">synchronous child run</text>

  <rect x="654" y="282" width="214" height="118" rx="10" fill="#FFF7ED" stroke="#F97316" stroke-width="2"/>
  <text x="761" y="314" text-anchor="middle" font-size="16" font-weight="700" fill="#9A3412">orchestrator</text>
  <text x="761" y="338" text-anchor="middle" font-size="12" fill="#C2410C">keeps delegate_task</text>
  <text x="761" y="361" text-anchor="middle" font-size="12" fill="#C2410C">may spawn children</text>
  <text x="761" y="382" text-anchor="middle" font-size="12" fill="#C2410C">bounded by max_spawn_depth</text>

  <rect x="654" y="468" width="214" height="76" rx="10" fill="#F1F5F9" stroke="#64748B" stroke-width="2"/>
  <text x="761" y="498" text-anchor="middle" font-size="15" font-weight="700" fill="#334155">nested leaf</text>
  <text x="761" y="522" text-anchor="middle" font-size="12" fill="#475569">depth=2 max in demo</text>

  <line x1="405" y1="192" x2="224" y2="278" stroke="#2563EB" stroke-width="2.5" marker-end="url(#blueArrow)"/>
  <line x1="480" y1="192" x2="480" y2="276" stroke="#2563EB" stroke-width="2.5" marker-end="url(#blueArrow)"/>
  <line x1="555" y1="192" x2="736" y2="278" stroke="#2563EB" stroke-width="2.5" marker-end="url(#blueArrow)"/>
  <text x="294" y="238" font-size="12" fill="#2563EB">batch/single delegation</text>

  <line x1="761" y1="400" x2="761" y2="462" stroke="#F97316" stroke-width="2.5" marker-end="url(#blueArrow)"/>
  <text x="779" y="436" font-size="12" fill="#C2410C">delegate_task()</text>

  <line x1="200" y1="400" x2="354" y2="492" stroke="#16A34A" stroke-width="2" stroke-dasharray="6,5" marker-end="url(#greenArrow)"/>
  <line x1="480" y1="400" x2="480" y2="492" stroke="#16A34A" stroke-width="2" stroke-dasharray="6,5" marker-end="url(#greenArrow)"/>
  <line x1="654" y1="506" x2="546" y2="506" stroke="#16A34A" stroke-width="2" stroke-dasharray="6,5" marker-end="url(#greenArrow)"/>
  <rect x="354" y="474" width="192" height="64" rx="8" fill="#DCFCE7" stroke="#22C55E"/>
  <text x="450" y="499" text-anchor="middle" font-size="13" font-weight="700" fill="#166534">Summaries return</text>
  <text x="450" y="520" text-anchor="middle" font-size="12" fill="#15803D">parent resumes after all children finish</text>

  <rect x="62" y="472" width="234" height="72" rx="8" fill="#EEF2FF" stroke="#6366F1"/>
  <text x="179" y="498" text-anchor="middle" font-size="13" font-weight="700" fill="#3730A3">Config guards</text>
  <text x="179" y="519" text-anchor="middle" font-size="12" fill="#4338CA">max_concurrent_children=3</text>
  <text x="179" y="538" text-anchor="middle" font-size="12" fill="#4338CA">max_spawn_depth=1 by default</text>
</svg>
