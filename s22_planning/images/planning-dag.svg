<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 500" style="background:#f8f9fa;font-family:system-ui,sans-serif">
  <defs><marker id="a" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto"><polygon points="0 0,10 3.5,0 7" fill="#1976D2"/></marker></defs>
  <text x="450" y="34" text-anchor="middle" font-size="20" font-weight="700" fill="#0D47A1">Planning System - TodoWrite As A Dependency Graph</text>
  <rect x="360" y="70" width="180" height="65" rx="10" fill="#E3F2FD" stroke="#1976D2" stroke-width="2"/><text x="450" y="108" text-anchor="middle" font-size="14" font-weight="700" fill="#1565C0">t1: DB schema</text>
  <rect x="170" y="190" width="180" height="65" rx="10" fill="#E8F5E9" stroke="#388E3C" stroke-width="2"/><text x="260" y="228" text-anchor="middle" font-size="14" font-weight="700" fill="#2E7D32">t2: register API</text>
  <rect x="550" y="190" width="180" height="65" rx="10" fill="#E8F5E9" stroke="#388E3C" stroke-width="2"/><text x="640" y="228" text-anchor="middle" font-size="14" font-weight="700" fill="#2E7D32">t3: login API</text>
  <rect x="360" y="310" width="180" height="65" rx="10" fill="#FFF3E0" stroke="#F57C00" stroke-width="2"/><text x="450" y="348" text-anchor="middle" font-size="14" font-weight="700" fill="#E65100">t4: tests</text>
  <rect x="360" y="420" width="180" height="55" rx="10" fill="#FFEBEE" stroke="#D32F2F" stroke-width="2"/><text x="450" y="453" text-anchor="middle" font-size="14" font-weight="700" fill="#C62828">t5: deploy</text>
  <line x1="410" y1="135" x2="300" y2="185" stroke="#1976D2" stroke-width="2.5" marker-end="url(#a)"/><line x1="490" y1="135" x2="600" y2="185" stroke="#1976D2" stroke-width="2.5" marker-end="url(#a)"/>
  <line x1="300" y1="255" x2="410" y2="305" stroke="#1976D2" stroke-width="2.5" marker-end="url(#a)"/><line x1="600" y1="255" x2="490" y2="305" stroke="#1976D2" stroke-width="2.5" marker-end="url(#a)"/><line x1="450" y1="375" x2="450" y2="415" stroke="#1976D2" stroke-width="2.5" marker-end="url(#a)"/>
  <rect x="55" y="315" width="210" height="95" rx="10" fill="#ECEFF1" stroke="#78909C" stroke-width="2"/>
  <text x="160" y="348" text-anchor="middle" font-size="14" font-weight="700" fill="#455A64">Task State</text>
  <text x="160" y="374" text-anchor="middle" font-size="12" fill="#546E7A">pending / in_progress</text>
  <text x="160" y="396" text-anchor="middle" font-size="12" fill="#546E7A">completed / blocked</text>
  <rect x="635" y="315" width="210" height="95" rx="10" fill="#ECEFF1" stroke="#78909C" stroke-width="2"/>
  <text x="740" y="348" text-anchor="middle" font-size="14" font-weight="700" fill="#455A64">Unlock Rule</text>
  <text x="740" y="374" text-anchor="middle" font-size="12" fill="#546E7A">all blocked_by done</text>
  <text x="740" y="396" text-anchor="middle" font-size="12" fill="#546E7A">then task becomes claimable</text>
</svg>
