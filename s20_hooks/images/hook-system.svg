<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 500" style="background:#f8f9fa;font-family:system-ui,sans-serif">
  <defs><marker id="a" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto"><polygon points="0 0,10 3.5,0 7" fill="#1976D2"/></marker><marker id="o" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto"><polygon points="0 0,10 3.5,0 7" fill="#F57C00"/></marker></defs>
  <text x="450" y="34" text-anchor="middle" font-size="20" font-weight="700" fill="#0D47A1">Hook System - Attach To The Loop, Do Not Rewrite It</text>
  <rect x="310" y="75" width="280" height="330" rx="14" fill="#1565C0" stroke="#0D47A1" stroke-width="3"/>
  <text x="450" y="110" text-anchor="middle" font-size="17" font-weight="700" fill="white">Agent Loop</text>
  <rect x="350" y="140" width="200" height="45" rx="8" fill="#BBDEFB"/><text x="450" y="168" text-anchor="middle" font-size="12" fill="#0D47A1">SESSION_START</text>
  <rect x="350" y="205" width="200" height="45" rx="8" fill="#BBDEFB"/><text x="450" y="233" text-anchor="middle" font-size="12" fill="#0D47A1">PRE_TOOL_USE</text>
  <rect x="350" y="270" width="200" height="45" rx="8" fill="#BBDEFB"/><text x="450" y="298" text-anchor="middle" font-size="12" fill="#0D47A1">POST_TOOL_USE</text>
  <rect x="350" y="335" width="200" height="45" rx="8" fill="#BBDEFB"/><text x="450" y="363" text-anchor="middle" font-size="12" fill="#0D47A1">SESSION_END / STOP</text>
  <rect x="55" y="130" width="190" height="80" rx="10" fill="#FFEBEE" stroke="#D32F2F" stroke-width="2"/><text x="150" y="162" text-anchor="middle" font-size="14" font-weight="700" fill="#C62828">Permission Hook</text><text x="150" y="187" text-anchor="middle" font-size="12" fill="#D32F2F">can block tool use</text>
  <rect x="55" y="280" width="190" height="80" rx="10" fill="#E8F5E9" stroke="#388E3C" stroke-width="2"/><text x="150" y="312" text-anchor="middle" font-size="14" font-weight="700" fill="#2E7D32">Telemetry Hook</text><text x="150" y="337" text-anchor="middle" font-size="12" fill="#388E3C">record usage</text>
  <rect x="655" y="130" width="190" height="80" rx="10" fill="#FFF3E0" stroke="#F57C00" stroke-width="2"/><text x="750" y="162" text-anchor="middle" font-size="14" font-weight="700" fill="#E65100">Result Hook</text><text x="750" y="187" text-anchor="middle" font-size="12" fill="#F57C00">clip / cache output</text>
  <rect x="655" y="280" width="190" height="80" rx="10" fill="#E3F2FD" stroke="#1976D2" stroke-width="2"/><text x="750" y="312" text-anchor="middle" font-size="14" font-weight="700" fill="#1565C0">Review Hook</text><text x="750" y="337" text-anchor="middle" font-size="12" fill="#1976D2">memory / skill review</text>
  <line x1="245" y1="170" x2="345" y2="225" stroke="#F57C00" stroke-width="2.5" marker-end="url(#o)"/>
  <line x1="245" y1="320" x2="345" y2="292" stroke="#1976D2" stroke-width="2.5" marker-end="url(#a)"/>
  <line x1="655" y1="170" x2="555" y2="292" stroke="#F57C00" stroke-width="2.5" marker-end="url(#o)"/>
  <line x1="655" y1="320" x2="555" y2="358" stroke="#1976D2" stroke-width="2.5" marker-end="url(#a)"/>
  <rect x="80" y="430" width="740" height="40" rx="8" fill="#ECEFF1" stroke="#B0BEC5"/><text x="450" y="455" text-anchor="middle" font-size="13" fill="#455A64">Hooks keep the core loop small while allowing permissions, logging, background review, and result processing to evolve independently.</text>
</svg>
