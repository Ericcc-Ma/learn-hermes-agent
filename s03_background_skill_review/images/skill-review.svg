<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 850 520" style="background:#f8f9fa;font-family:system-ui,sans-serif">
  <defs>
    <marker id="arrowBlue" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#1976D2"/>
    </marker>
    <marker id="arrowGreen" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#388E3C"/>
    </marker>
    <marker id="arrowOrange" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#F57C00"/>
    </marker>
    <marker id="arrowRed" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#D32F2F"/>
    </marker>
  </defs>

  <!-- Title -->
  <text x="425" y="32" text-anchor="middle" font-size="18" font-weight="bold" fill="#1565C0">Background Skill Review (后台技能审查)</text>

  <!-- 4 Signal Types -->
  <rect x="20" y="55" width="810" height="110" rx="8" fill="#E3F2FD" stroke="#1976D2" stroke-width="2"/>
  <text x="425" y="78" text-anchor="middle" font-size="14" font-weight="bold" fill="#1565C0">4 Signal Types（4 种信号类型）</text>

  <rect x="40" y="92" width="175" height="55" rx="6" fill="#BBDEFB" stroke="#1976D2" stroke-width="1.5"/>
  <text x="127" y="115" text-anchor="middle" font-size="12" font-weight="bold" fill="#1565C0">Correction (纠正)</text>
  <text x="127" y="133" text-anchor="middle" font-size="10" fill="#1976D2">用户纠正了技能行为</text>

  <rect x="230" y="92" width="175" height="55" rx="6" fill="#BBDEFB" stroke="#1976D2" stroke-width="1.5"/>
  <text x="317" y="115" text-anchor="middle" font-size="12" font-weight="bold" fill="#1565C0">Technique (技巧)</text>
  <text x="317" y="133" text-anchor="middle" font-size="10" fill="#1976D2">LLM 使用的技术模式</text>

  <rect x="420" y="92" width="175" height="55" rx="6" fill="#BBDEFB" stroke="#1976D2" stroke-width="1.5"/>
  <text x="507" y="115" text-anchor="middle" font-size="12" font-weight="bold" fill="#1565C0">Outdated (过时)</text>
  <text x="507" y="133" text-anchor="middle" font-size="10" fill="#1976D2">工具/信息已过期</text>

  <rect x="610" y="92" width="190" height="55" rx="6" fill="#BBDEFB" stroke="#1976D2" stroke-width="1.5"/>
  <text x="705" y="115" text-anchor="middle" font-size="12" font-weight="bold" fill="#1565C0">Repeated (重复)</text>
  <text x="705" y="133" text-anchor="middle" font-size="10" fill="#1976D2">同一建议反复出现</text>

  <!-- Forbidden Capture Filter -->
  <rect x="200" y="190" width="450" height="60" rx="8" fill="#FFEBEE" stroke="#D32F2F" stroke-width="2"/>
  <text x="425" y="215" text-anchor="middle" font-size="14" font-weight="bold" fill="#C62828">Forbidden Capture Filter（禁止捕获过滤器）</text>
  <text x="425" y="237" text-anchor="middle" font-size="11" fill="#D32F2F">标注为 [manual] / [dangerous] 的技能不得自动修改</text>

  <!-- Cross line -->
  <line x1="370" y1="165" x2="320" y2="187" stroke="#D32F2F" stroke-width="2" marker-end="url(#arrowRed)"/>
  <line x1="470" y1="165" x2="520" y2="187" stroke="#D32F2F" stroke-width="2" marker-end="url(#arrowRed)"/>
  <text x="345" y="180" font-size="10" fill="#D32F2F">过滤</text>
  <text x="495" y="180" font-size="10" fill="#D32F2F">拒绝</text>

  <!-- Action Priority Pipeline -->
  <rect x="60" y="280" width="730" height="135" rx="8" fill="#E8F5E9" stroke="#388E3C" stroke-width="2"/>
  <text x="425" y="305" text-anchor="middle" font-size="14" font-weight="bold" fill="#2E7D32">Action Priority Pipeline（动作优先级管道）</text>

  <rect x="80" y="320" width="160" height="40" rx="6" fill="#FFF3E0" stroke="#F57C00" stroke-width="1.5"/>
  <text x="160" y="344" text-anchor="middle" font-size="12" font-weight="bold" fill="#E65100">P1: Correction</text>

  <rect x="260" y="320" width="160" height="40" rx="6" fill="#E8F5E9" stroke="#388E3C" stroke-width="1.5"/>
  <text x="340" y="344" text-anchor="middle" font-size="12" font-weight="bold" fill="#2E7D32">P2: Technique</text>

  <rect x="440" y="320" width="160" height="40" rx="6" fill="#E8F5E9" stroke="#388E3C" stroke-width="1.5"/>
  <text x="520" y="344" text-anchor="middle" font-size="12" font-weight="bold" fill="#2E7D32">P3: Outdated</text>

  <rect x="620" y="320" width="150" height="40" rx="6" fill="#E8F5E9" stroke="#388E3C" stroke-width="1.5"/>
  <text x="695" y="344" text-anchor="middle" font-size="12" font-weight="bold" fill="#2E7D32">P4: Repeated</text>

  <!-- Priority arrows -->
  <line x1="240" y1="340" x2="255" y2="340" stroke="#F57C00" stroke-width="1.5" marker-end="url(#arrowOrange)"/>
  <line x1="420" y1="340" x2="435" y2="340" stroke="#1976D2" stroke-width="1.5" marker-end="url(#arrowBlue)"/>
  <line x1="600" y1="340" x2="615" y2="340" stroke="#1976D2" stroke-width="1.5" marker-end="url(#arrowBlue)"/>

  <text x="425" y="382" text-anchor="middle" font-size="10" fill="#388E3C">按优先级处理信号，避免冲突</text>

  <!-- Outcomes -->
  <rect x="100" y="430" width="650" height="65" rx="8" fill="#E3F2FD" stroke="#1565C0" stroke-width="2"/>
  <text x="425" y="453" text-anchor="middle" font-size="14" font-weight="bold" fill="#1565C0">Skill Update Outcomes（技能更新结果）</text>

  <rect x="120" y="462" width="170" height="25" rx="5" fill="#E3F2FD" stroke="#1976D2" stroke-width="1"/>
  <text x="205" y="480" text-anchor="middle" font-size="11" fill="#1565C0">Create (创建新技能)</text>

  <rect x="310" y="462" width="170" height="25" rx="5" fill="#E3F2FD" stroke="#1976D2" stroke-width="1"/>
  <text x="395" y="480" text-anchor="middle" font-size="11" fill="#1565C0">Update (更新现有技能)</text>

  <rect x="500" y="462" width="170" height="25" rx="5" fill="#E3F2FD" stroke="#1976D2" stroke-width="1"/>
  <text x="585" y="480" text-anchor="middle" font-size="11" fill="#1565C0">Append (追加信息)</text>

  <!-- Legend -->
  <rect x="30" y="505" width="790" height="10" rx="3" fill="#ECEFF1" opacity="0"/>
</svg>
