name: Tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Syntax check — llm.py
        run: python -m py_compile llm.py

      - name: Syntax check — all 24 chapters
        run: |
          for f in s01_agent_loop/agent_loop.py s02_background_memory_review/background_memory_review.py s03_background_skill_review/background_skill_review.py s04_memory_system/memory_system.py s05_skill_lifecycle/skill_lifecycle.py s06_skill_creation/skill_creation.py s07_curator_state/curator_state.py s08_curator_llm/curator_llm.py s09_context_management/context_management.py s10_insights/insights.py s11_error_recovery/error_recovery.py s12_comprehensive/comprehensive.py s13_cron_scheduler/cron_scheduler.py s14_gateway/gateway.py s15_profiles/profiles.py s16_agent_teams/agent_teams.py s17_mcp_plugin/mcp_plugin.py s18_full_hermes/full_hermes.py s19_permission/permission.py s20_hooks/hooks.py s21_worktree/worktree.py s22_planning/planning.py s23_autonomous/autonomous.py s24_system_prompt/system_prompt.py; do
            echo "  Compiling: $f"
            python -m py_compile "$f"
          done

      - name: Import check — llm module
        run: python -c "from llm import get_client; print('OK')"

      - name: Run pytest
        run: python -m pytest tests/ -v --tb=short
