name: Tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Syntax check — llm.py
        run: python -m py_compile llm.py

      - name: Syntax check — all 12 chapters
        run: |
          for f in s01_agent_loop/code.py s02_background_memory_review/code.py s03_background_skill_review/code.py s04_memory_system/code.py s05_skill_lifecycle/code.py s06_skill_creation/code.py s07_curator_state/code.py s08_curator_llm/code.py s09_context_management/code.py s10_insights/code.py s11_error_recovery/code.py s12_comprehensive/code.py; do
            echo "  Compiling: $f"
            python -m py_compile "$f"
          done

      - name: Import check — llm module
        run: python -c "from llm import get_client; print('OK')"

      - name: Run pytest
        run: python -m pytest tests/ -v --tb=short
