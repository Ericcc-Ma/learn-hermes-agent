<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 640" width="1280" height="640">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0d1117"/>
      <stop offset="100%" style="stop-color:#161b22"/>
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#1976D2"/>
      <stop offset="100%" style="stop-color:#7C4DFF"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="1280" height="640" fill="url(#bg)"/>

  <!-- Decorative grid -->
  <g opacity="0.03" stroke="#fff" stroke-width="0.5">
    <line x1="0" y1="160" x2="1280" y2="160"/>
    <line x1="0" y1="320" x2="1280" y2="320"/>
    <line x1="0" y1="480" x2="1280" y2="480"/>
    <line x1="320" y1="0" x2="320" y2="640"/>
    <line x1="640" y1="0" x2="640" y2="640"/>
    <line x1="960" y1="0" x2="960" y2="640"/>
  </g>

  <!-- Accent bar -->
  <rect x="80" y="240" width="6" height="160" rx="3" fill="url(#accent)"/>

  <!-- Title -->
  <text x="120" y="295" font-family="system-ui,-apple-system,sans-serif" font-size="52" font-weight="800" fill="#ffffff">
    Learn Hermes Agent
  </text>

  <!-- Subtitle -->
  <text x="120" y="350" font-family="system-ui,-apple-system,sans-serif" font-size="24" fill="#8b949e">
    Build a Self-Evolving Agent Harness from Scratch
  </text>

  <!-- Tagline -->
  <text x="120" y="400" font-family="monospace" font-size="16" fill="#58a6ff">
    Agency comes from the Model. Self-Evolution comes from the Harness.
  </text>

  <!-- Bottom bar -->
  <rect x="0" y="560" width="1280" height="80" fill="#0d1117" opacity="0.5"/>
  <text x="80" y="605" font-family="system-ui,sans-serif" font-size="16" fill="#8b949e">
    12 Progressive Lessons · 6 Self-Evolution Layers · Multi-Provider LLM Support · Chinese &amp; English
  </text>
</svg>
