<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 430" style="background:#f8f9fa;font-family:system-ui,sans-serif">
  <defs><marker id="a" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto"><polygon points="0 0,10 3.5,0 7" fill="#1976D2"/></marker></defs>
  <text x="450" y="34" text-anchor="middle" font-size="20" font-weight="700" fill="#0D47A1">Permission System - Boundaries Before Freedom</text>
  <rect x="40" y="105" width="135" height="70" rx="10" fill="#E3F2FD" stroke="#1976D2" stroke-width="2"/><text x="108" y="146" text-anchor="middle" font-weight="700" fill="#1565C0">Command</text>
  <rect x="230" y="105" width="135" height="70" rx="10" fill="#ECEFF1" stroke="#78909C" stroke-width="2"/><text x="298" y="146" text-anchor="middle" font-weight="700" fill="#455A64">Rule Match</text>
  <rect x="420" y="60" width="135" height="70" rx="10" fill="#FFEBEE" stroke="#D32F2F" stroke-width="2"/><text x="488" y="101" text-anchor="middle" font-weight="700" fill="#C62828">DENY</text>
  <rect x="420" y="150" width="135" height="70" rx="10" fill="#FFF3E0" stroke="#F57C00" stroke-width="2"/><text x="488" y="191" text-anchor="middle" font-weight="700" fill="#E65100">ASK_USER</text>
  <rect x="610" y="105" width="135" height="70" rx="10" fill="#E8F5E9" stroke="#388E3C" stroke-width="2"/><text x="678" y="146" text-anchor="middle" font-weight="700" fill="#2E7D32">SANDBOX</text>
  <rect x="790" y="105" width="80" height="70" rx="10" fill="#E3F2FD" stroke="#1976D2" stroke-width="2"/><text x="830" y="146" text-anchor="middle" font-weight="700" fill="#1565C0">ALLOW</text>
  <line x1="175" y1="140" x2="225" y2="140" stroke="#1976D2" stroke-width="2.5" marker-end="url(#a)"/><line x1="365" y1="140" x2="415" y2="95" stroke="#1976D2" stroke-width="2.5" marker-end="url(#a)"/><line x1="365" y1="140" x2="415" y2="185" stroke="#1976D2" stroke-width="2.5" marker-end="url(#a)"/><line x1="555" y1="185" x2="605" y2="140" stroke="#1976D2" stroke-width="2.5" marker-end="url(#a)"/><line x1="745" y1="140" x2="785" y2="140" stroke="#1976D2" stroke-width="2.5" marker-end="url(#a)"/>
  <rect x="110" y="275" width="220" height="70" rx="10" fill="#FFEBEE" stroke="#D32F2F" stroke-width="2"/><text x="220" y="304" text-anchor="middle" font-size="13" font-weight="700" fill="#C62828">Hard stops</text><text x="220" y="328" text-anchor="middle" font-size="12" fill="#D32F2F">rm -rf /, sudo, secrets</text>
  <rect x="370" y="275" width="220" height="70" rx="10" fill="#FFF3E0" stroke="#F57C00" stroke-width="2"/><text x="480" y="304" text-anchor="middle" font-size="13" font-weight="700" fill="#E65100">Human approval</text><text x="480" y="328" text-anchor="middle" font-size="12" fill="#F57C00">git push --force, deploy</text>
  <rect x="630" y="275" width="220" height="70" rx="10" fill="#E8F5E9" stroke="#388E3C" stroke-width="2"/><text x="740" y="304" text-anchor="middle" font-size="13" font-weight="700" fill="#2E7D32">Session memory</text><text x="740" y="328" text-anchor="middle" font-size="12" fill="#388E3C">approved once, avoid repeats</text>
</svg>
