<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 520" style="background:#f8f9fa;font-family:system-ui,sans-serif">
  <defs><marker id="a" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto"><polygon points="0 0,10 3.5,0 7" fill="#1976D2"/></marker></defs>
  <text x="450" y="34" text-anchor="middle" font-size="20" font-weight="700" fill="#0D47A1">MCP Plugin - External Capabilities Join The Tool Pool</text>
  <rect x="55" y="80" width="210" height="115" rx="12" fill="#E3F2FD" stroke="#1976D2" stroke-width="2"/>
  <text x="160" y="114" text-anchor="middle" font-size="16" font-weight="700" fill="#1565C0">Built-in Tools</text>
  <text x="160" y="142" text-anchor="middle" font-size="12" fill="#1976D2">bash / file / browser</text>
  <text x="160" y="166" text-anchor="middle" font-size="12" fill="#1976D2">memory / skills</text>
  <rect x="55" y="260" width="210" height="135" rx="12" fill="#FFF3E0" stroke="#F57C00" stroke-width="2"/>
  <text x="160" y="294" text-anchor="middle" font-size="16" font-weight="700" fill="#E65100">MCP Servers</text>
  <text x="160" y="322" text-anchor="middle" font-size="12" fill="#F57C00">stdio</text>
  <text x="160" y="346" text-anchor="middle" font-size="12" fill="#F57C00">SSE</text>
  <text x="160" y="370" text-anchor="middle" font-size="12" fill="#F57C00">streamable HTTP</text>
  <rect x="360" y="140" width="220" height="155" rx="12" fill="#E8F5E9" stroke="#388E3C" stroke-width="2"/>
  <text x="470" y="176" text-anchor="middle" font-size="16" font-weight="700" fill="#2E7D32">Tool Registry</text>
  <text x="470" y="204" text-anchor="middle" font-size="12" fill="#388E3C">normalize schemas</text>
  <text x="470" y="228" text-anchor="middle" font-size="12" fill="#388E3C">dedupe names</text>
  <text x="470" y="252" text-anchor="middle" font-size="12" fill="#388E3C">route calls by origin</text>
  <rect x="675" y="110" width="170" height="90" rx="12" fill="#1565C0" stroke="#0D47A1" stroke-width="2"/>
  <text x="760" y="146" text-anchor="middle" font-size="16" font-weight="700" fill="white">LLM</text>
  <text x="760" y="172" text-anchor="middle" font-size="12" fill="#BBDEFB">sees one tools[]</text>
  <rect x="675" y="290" width="170" height="100" rx="12" fill="#ECEFF1" stroke="#78909C" stroke-width="2"/>
  <text x="760" y="326" text-anchor="middle" font-size="16" font-weight="700" fill="#455A64">JSON-RPC</text>
  <text x="760" y="352" text-anchor="middle" font-size="12" fill="#546E7A">tools/call</text>
  <text x="760" y="374" text-anchor="middle" font-size="12" fill="#546E7A">result/error</text>
  <line x1="265" y1="138" x2="355" y2="190" stroke="#1976D2" stroke-width="2.5" marker-end="url(#a)"/>
  <line x1="265" y1="328" x2="355" y2="245" stroke="#1976D2" stroke-width="2.5" marker-end="url(#a)"/>
  <line x1="580" y1="190" x2="670" y2="155" stroke="#1976D2" stroke-width="2.5" marker-end="url(#a)"/>
  <path d="M760 200 L760 285" stroke="#1976D2" stroke-width="2.5" marker-end="url(#a)"/>
  <path d="M675 340 C560 420 300 420 205 395" fill="none" stroke="#1976D2" stroke-width="2.5" marker-end="url(#a)"/>
  <text x="530" y="420" text-anchor="middle" font-size="12" fill="#1976D2">Agent calls a tool; registry routes it back to built-in or MCP server.</text>
</svg>
