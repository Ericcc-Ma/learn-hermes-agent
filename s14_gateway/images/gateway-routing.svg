<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 520" style="background:#f8f9fa;font-family:system-ui,sans-serif">
  <defs><marker id="a" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto"><polygon points="0 0,10 3.5,0 7" fill="#1976D2"/></marker></defs>
  <text x="450" y="34" text-anchor="middle" font-size="20" font-weight="700" fill="#0D47A1">Gateway - One Entry For Many Platforms</text>
  <g fill="#E3F2FD" stroke="#1976D2" stroke-width="2">
    <rect x="35" y="82" width="130" height="54" rx="8"/><rect x="35" y="158" width="130" height="54" rx="8"/><rect x="35" y="234" width="130" height="54" rx="8"/><rect x="35" y="310" width="130" height="54" rx="8"/><rect x="35" y="386" width="130" height="54" rx="8"/>
  </g>
  <g font-size="13" font-weight="700" fill="#1565C0" text-anchor="middle">
    <text x="100" y="114">CLI</text><text x="100" y="190">Telegram</text><text x="100" y="266">Discord</text><text x="100" y="342">Slack</text><text x="100" y="418">Cron/API</text>
  </g>
  <rect x="255" y="95" width="190" height="320" rx="12" fill="#FFF3E0" stroke="#F57C00" stroke-width="2"/>
  <text x="350" y="130" text-anchor="middle" font-size="16" font-weight="700" fill="#E65100">Platform Adapters</text>
  <text x="350" y="170" text-anchor="middle" font-size="12" fill="#F57C00">receive()</text>
  <text x="350" y="205" text-anchor="middle" font-size="12" fill="#F57C00">normalize message</text>
  <text x="350" y="240" text-anchor="middle" font-size="12" fill="#F57C00">send()</text>
  <text x="350" y="275" text-anchor="middle" font-size="12" fill="#F57C00">auth &amp; formatting</text>
  <text x="350" y="335" text-anchor="middle" font-size="12" fill="#F57C00">platform-specific code</text>
  <rect x="525" y="95" width="190" height="110" rx="12" fill="#E8F5E9" stroke="#388E3C" stroke-width="2"/>
  <text x="620" y="128" text-anchor="middle" font-size="16" font-weight="700" fill="#2E7D32">GatewayMessage</text>
  <text x="620" y="154" text-anchor="middle" font-size="12" fill="#388E3C">platform / channel</text>
  <text x="620" y="176" text-anchor="middle" font-size="12" fill="#388E3C">user / text / message_id</text>
  <rect x="525" y="245" width="190" height="90" rx="12" fill="#E3F2FD" stroke="#1976D2" stroke-width="2"/>
  <text x="620" y="278" text-anchor="middle" font-size="16" font-weight="700" fill="#1565C0">Session Manager</text>
  <text x="620" y="305" text-anchor="middle" font-size="12" fill="#1976D2">platform:channel:user</text>
  <rect x="525" y="375" width="190" height="90" rx="12" fill="#FFF3E0" stroke="#F57C00" stroke-width="2"/>
  <text x="620" y="408" text-anchor="middle" font-size="16" font-weight="700" fill="#E65100">Delivery Router</text>
  <text x="620" y="435" text-anchor="middle" font-size="12" fill="#F57C00">reply to origin platform</text>
  <rect x="770" y="215" width="95" height="90" rx="12" fill="#1565C0" stroke="#0D47A1" stroke-width="2"/>
  <text x="818" y="253" text-anchor="middle" font-size="15" font-weight="700" fill="white">Agent</text>
  <text x="818" y="278" text-anchor="middle" font-size="11" fill="#BBDEFB">one loop</text>
