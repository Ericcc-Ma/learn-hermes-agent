<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 750" style="background:#f8f9fa;font-family:system-ui,sans-serif">
  <defs>
    <marker id="arrowBlue" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#1976D2"/>
    </marker>
    <marker id="arrowGreen" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#388E3C"/>
    </marker>
    <marker id="arrowOrange" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#F57C00"/>
    </marker>
    <marker id="arrowGray" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#78909C"/>
    </marker>
    <marker id="arrowRed" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#D32F2F"/>
    </marker>
  </defs>

  <!-- Title -->
  <text x="450" y="32" text-anchor="middle" font-size="20" font-weight="bold" fill="#0D47A1">Hermes Agent - Complete Six-Layer Architecture (六层完整架构)</text>

  <!-- ====== CENTER: Agent Loop ====== -->
  <rect x="250" y="55" width="400" height="70" rx="10" fill="#1565C0" stroke="#0D47A1" stroke-width="3"/>
  <text x="450" y="82" text-anchor="middle" font-size="16" font-weight="bold" fill="white">Agent Loop (代理循环)</text>
  <text x="450" y="105" text-anchor="middle" font-size="12" fill="#BBDEFB">User Input -> messages[] -> LLM -> Response -> stop_reason -> Tool -> loop</text>

  <!-- ====== Layer 1: Background Review (Top Left) ====== -->
  <rect x="30" y="145" width="260" height="200" rx="8" fill="#E3F2FD" stroke="#1976D2" stroke-width="2"/>
  <text x="160" y="172" text-anchor="middle" font-size="13" font-weight="bold" fill="#1565C0">Layer 1: Background Review</text>
  <text x="160" y="190" text-anchor="middle" font-size="11" fill="#1976D2">(后台回顾系统)</text>

  <rect x="48" y="205" width="224" height="35" rx="6" fill="#BBDEFB" stroke="#1976D2" stroke-width="1.5"/>
  <text x="160" y="221" text-anchor="middle" font-size="11" fill="#1565C0">Memory Review</text>
  <text x="160" y="235" text-anchor="middle" font-size="9" fill="#1976D2">每 N 轮自动审查记忆</text>

  <rect x="48" y="248" width="224" height="35" rx="6" fill="#BBDEFB" stroke="#1976D2" stroke-width="1.5"/>
  <text x="160" y="264" text-anchor="middle" font-size="11" fill="#1565C0">Skill Review</text>
  <text x="160" y="278" text-anchor="middle" font-size="9" fill="#1976D2">技能质量定期审查</text>

  <rect x="48" y="291" width="224" height="35" rx="6" fill="#BBDEFB" stroke="#1976D2" stroke-width="1.5"/>
  <text x="160" y="307" text-anchor="middle" font-size="11" fill="#1565C0">Nudge System</text>
  <text x="160" y="321" text-anchor="middle" font-size="9" fill="#1976D2">Forked Review Agent</text>

  <!-- ====== Layer 2: Skill Lifecycle (Top Right) ====== -->
  <rect x="610" y="145" width="260" height="200" rx="8" fill="#E8F5E9" stroke="#388E3C" stroke-width="2"/>
  <text x="740" y="172" text-anchor="middle" font-size="13" font-weight="bold" fill="#2E7D32">Layer 2: Skill Lifecycle</text>
  <text x="740" y="190" text-anchor="middle" font-size="11" fill="#388E3C">(技能生命周期与创建)</text>

  <rect x="628" y="205" width="224" height="35" rx="6" fill="#C8E6C9" stroke="#388E3C" stroke-width="1.5"/>
  <text x="740" y="221" text-anchor="middle" font-size="11" fill="#1B5E20">Skill State Machine</text>
  <text x="740" y="235" text-anchor="middle" font-size="9" fill="#2E7D32">Active / Stale / Archived</text>

  <rect x="628" y="248" width="224" height="35" rx="6" fill="#C8E6C9" stroke="#388E3C" stroke-width="1.5"/>
  <text x="740" y="264" text-anchor="middle" font-size="11" fill="#1B5E20">Skill Creation</text>
  <text x="740" y="278" text-anchor="middle" font-size="9" fill="#2E7D32">4 种信号 + 安全门控</text>

  <rect x="628" y="291" width="224" height="35" rx="6" fill="#C8E6C9" stroke="#388E3C" stroke-width="1.5"/>
  <text x="740" y="307" text-anchor="middle" font-size="11" fill="#1B5E20">Pin Exemption</text>
  <text x="740" y="321" text-anchor="middle" font-size="9" fill="#2E7D32">钉选豁免永久 Active</text>

  <!-- ====== Layer 3: Curator (Right) ====== -->
  <rect x="610" y="365" width="260" height="200" rx="8" fill="#FFF3E0" stroke="#F57C00" stroke-width="2"/>
  <text x="740" y="392" text-anchor="middle" font-size="13" font-weight="bold" fill="#E65100">Layer 3: Curator System</text>
  <text x="740" y="410" text-anchor="middle" font-size="11" fill="#F57C00">(策展系统)</text>

  <rect x="628" y="425" width="224" height="35" rx="6" fill="#FFE0B2" stroke="#F57C00" stroke-width="1.5"/>
  <text x="740" y="441" text-anchor="middle" font-size="11" fill="#E65100">Phase 1: Rule Engine</text>
  <text x="740" y="455" text-anchor="middle" font-size="9" fill="#F57C00">零 LLM 成本 · 3 状态流转</text>

  <rect x="628" y="468" width="224" height="35" rx="6" fill="#FFE0B2" stroke="#F57C00" stroke-width="1.5"/>
  <text x="740" y="484" text-anchor="middle" font-size="11" fill="#E65100">Phase 2: LLM Review</text>
  <text x="740" y="498" text-anchor="middle" font-size="9" fill="#F57C00">前缀聚类 + 合并策略</text>

  <rect x="628" y="511" width="224" height="35" rx="6" fill="#FFE0B2" stroke="#F57C00" stroke-width="1.5"/>
  <text x="740" y="527" text-anchor="middle" font-size="11" fill="#E65100">Umbrella Merge</text>
  <text x="740" y="541" text-anchor="middle" font-size="9" fill="#F57C00">合并/拆分/降级 + HITL</text>

  <!-- ====== Layer 4: Memory System (Bottom Left) ====== -->
  <rect x="30" y="365" width="260" height="200" rx="8" fill="#E3F2FD" stroke="#1976D2" stroke-width="2"/>
  <text x="160" y="392" text-anchor="middle" font-size="13" font-weight="bold" fill="#1565C0">Layer 4: Memory System</text>
  <text x="160" y="410" text-anchor="middle" font-size="11" fill="#1976D2">(记忆系统)</text>

  <rect x="48" y="425" width="224" height="35" rx="6" fill="#BBDEFB" stroke="#1976D2" stroke-width="1.5"/>
  <text x="160" y="441" text-anchor="middle" font-size="11" fill="#1565C0">MemoryManager</text>
  <text x="160" y="455" text-anchor="middle" font-size="9" fill="#1976D2">统一调度与编排</text>

  <rect x="48" y="468" width="224" height="35" rx="6" fill="#BBDEFB" stroke="#1976D2" stroke-width="1.5"/>
  <text x="160" y="484" text-anchor="middle" font-size="11" fill="#1565C0">Dual-layer Provider</text>
  <text x="160" y="498" text-anchor="middle" font-size="9" fill="#1976D2">Builtin + External</text>

  <rect x="48" y="511" width="224" height="35" rx="6" fill="#BBDEFB" stroke="#1976D2" stroke-width="1.5"/>
  <text x="160" y="527" text-anchor="middle" font-size="11" fill="#1565C0">Lifecycle Hooks</text>
  <text x="160" y="541" text-anchor="middle" font-size="9" fill="#1976D2">6 个生命周期钩子</text>

  <!-- ====== Layer 5: Context Management (Bottom Center) ====== -->
  <rect x="320" y="390" width="260" height="175" rx="8" fill="#E8F5E9" stroke="#388E3C" stroke-width="2"/>
  <text x="450" y="417" text-anchor="middle" font-size="13" font-weight="bold" fill="#2E7D32">Layer 5: Context</text>
  <text x="450" y="435" text-anchor="middle" font-size="11" fill="#388E3C">(上下文管理)</text>

  <rect x="338" y="452" width="224" height="35" rx="6" fill="#C8E6C9" stroke="#388E3C" stroke-width="1.5"/>
  <text x="450" y="468" text-anchor="middle" font-size="11" fill="#1B5E20">Head + Tail Protection</text>
  <text x="450" y="482" text-anchor="middle" font-size="9" fill="#2E7D32">前3条 + 后6条保留</text>

  <rect x="338" y="494" width="224" height="35" rx="6" fill="#C8E6C9" stroke="#388E3C" stroke-width="1.5"/>
  <text x="450" y="510" text-anchor="middle" font-size="11" fill="#1B5E20">Middle Compression</text>
  <text x="450" y="524" text-anchor="middle" font-size="9" fill="#2E7D32">Aux 模型生成摘要</text>

  <rect x="338" y="536" width="110" height="25" rx="5" fill="#A5D6A7" stroke="#388E3C" stroke-width="1"/>
  <text x="393" y="553" text-anchor="middle" font-size="9" fill="#1B5E20">mem_prefetch</text>

  <rect x="453" y="536" width="110" height="25" rx="5" fill="#A5D6A7" stroke="#388E3C" stroke-width="1"/>
  <text x="508" y="553" text-anchor="middle" font-size="9" fill="#1B5E20">rebuild_msgs</text>

  <!-- ====== Layer 6: Insights (Bottom Right) ====== -->
  <rect x="610" y="590" width="260" height="130" rx="8" fill="#E3F2FD" stroke="#1976D2" stroke-width="2"/>
  <text x="740" y="617" text-anchor="middle" font-size="13" font-weight="bold" fill="#1565C0">Layer 6: Insights</text>
  <text x="740" y="635" text-anchor="middle" font-size="11" fill="#1976D2">(洞察引擎)</text>

  <rect x="628" y="647" width="108" height="30" rx="6" fill="#BBDEFB" stroke="#1976D2" stroke-width="1.5"/>
  <text x="682" y="667" text-anchor="middle" font-size="10" fill="#1565C0">Token</text>

  <rect x="742" y="647" width="108" height="30" rx="6" fill="#BBDEFB" stroke="#1976D2" stroke-width="1.5"/>
  <text x="796" y="667" text-anchor="middle" font-size="10" fill="#1565C0">Cost (200+)</text>

  <rect x="628" y="682" width="108" height="30" rx="6" fill="#BBDEFB" stroke="#1976D2" stroke-width="1.5"/>
  <text x="682" y="702" text-anchor="middle" font-size="10" fill="#1565C0">Tools</text>

  <rect x="742" y="682" width="108" height="30" rx="6" fill="#BBDEFB" stroke="#1976D2" stroke-width="1.5"/>
  <text x="796" y="702" text-anchor="middle" font-size="10" fill="#1565C0">Sessions</text>

  <!-- Error Recovery (small, next to Insights) -->
  <rect x="30" y="590" width="260" height="130" rx="8" fill="#FFEBEE" stroke="#D32F2F" stroke-width="2"/>
  <text x="160" y="617" text-anchor="middle" font-size="13" font-weight="bold" fill="#C62828">Error Recovery</text>
  <text x="160" y="635" text-anchor="middle" font-size="11" fill="#D32F2F">(错误恢复)</text>

  <rect x="48" y="647" width="224" height="30" rx="6" fill="#FFCDD2" stroke="#D32F2F" stroke-width="1.5"/>
  <text x="160" y="667" text-anchor="middle" font-size="10" fill="#C62828">3-Layer Recovery Tower</text>

  <rect x="48" y="682" width="224" height="30" rx="6" fill="#FFCDD2" stroke="#D32F2F" stroke-width="1.5"/>
  <text x="160" y="702" text-anchor="middle" font-size="10" fill="#C62828">Error -> Skill Learning</text>

  <!-- ====== DATA FLOW ARROWS ====== -->

  <!-- Agent Loop to Background Review (top-left) -->
  <path d="M 320,90 L 160,90 L 160,142" stroke="#1976D2" stroke-width="1.5" fill="none" marker-end="url(#arrowBlue)"/>
  <text x="240" y="105" text-anchor="middle" font-size="9" fill="#1976D2">触发审查</text>

  <!-- Agent Loop to Skill Lifecycle (top-right) -->
  <path d="M 580,90 L 740,90 L 740,142" stroke="#388E3C" stroke-width="1.5" fill="none" marker-end="url(#arrowGreen)"/>
  <text x="660" y="105" text-anchor="middle" font-size="9" fill="#388E3C">技能更新</text>

  <!-- Agent Loop to Curator (right) -->
  <path d="M 650,125 L 700,125 L 700,362" stroke="#F57C00" stroke-width="1.5" fill="none" marker-end="url(#arrowOrange)"/>
  <text x="710" y="240" text-anchor="middle" font-size="9" fill="#F57C00">策展触发</text>

  <!-- Agent Loop to Memory (bottom-left) -->
  <line x1="320" y1="125" x2="160" y2="362" stroke="#1976D2" stroke-width="1.5" marker-end="url(#arrowBlue)"/>
  <text x="240" y="240" text-anchor="middle" font-size="9" fill="#1976D2">记忆读写</text>

  <!-- Agent Loop to Context (bottom-center) -->
  <line x1="450" y1="125" x2="450" y2="387" stroke="#388E3C" stroke-width="1.5" marker-end="url(#arrowGreen)"/>
  <text x="470" y="255" text-anchor="middle" font-size="9" fill="#388E3C">上下文溢出检测</text>

  <!-- Agent Loop to Insights (bottom-right) -->
  <path d="M 580,125 L 810,125 L 810,362 L 740,587" stroke="#1976D2" stroke-width="1.5" fill="none" marker-end="url(#arrowBlue)"/>
  <text x="820" y="330" text-anchor="middle" font-size="9" fill="#1976D2">事件记录</text>

  <!-- Agent Loop to Error Recovery (bottom-left low) -->
  <path d="M 320,125 L 160,587" stroke="#D32F2F" stroke-width="1.5" stroke-dasharray="4,3" marker-end="url(#arrowRed)"/>
  <text x="190" y="350" text-anchor="middle" font-size="9" fill="#D32F2F">错误触发</text>

  <!-- Background Review -> Memory System -->
  <path d="M 160,345 L 160,362" stroke="#1976D2" stroke-width="2" marker-end="url(#arrowBlue)"/>
  <text x="180" y="358" text-anchor="middle" font-size="9" fill="#1976D2">写入</text>

  <!-- Skill Lifecycle -> Curator -->
  <path d="M 740,345 L 740,362" stroke="#F57C00" stroke-width="2" marker-end="url(#arrowOrange)"/>
  <text x="760" y="358" text-anchor="middle" font-size="9" fill="#F57C00">待策展</text>

  <!-- Memory -> Context (prefetch) -->
  <line x1="290" y1="495" x2="315" y2="495" stroke="#1976D2" stroke-width="2" marker-end="url(#arrowBlue)"/>
  <text x="302" y="485" text-anchor="middle" font-size="9" fill="#1976D2">预取</text>

  <!-- Context -> Agent Loop (rebuild messages) -->
  <path d="M 450,390 L 450,128" stroke="#388E3C" stroke-width="1.5" stroke-dasharray="4,3" fill="none" marker-end="url(#arrowGreen)"/>
  <text x="480" y="260" text-anchor="middle" font-size="9" fill="#388E3C">重建 msg[]</text>

  <!-- Memory -> Agent Loop (inject) -->
  <path d="M 160,365 L 160,300 L 280,300 L 280,128" stroke="#1976D2" stroke-width="1.5" stroke-dasharray="4,3" fill="none" marker-end="url(#arrowBlue)"/>
  <text x="215" y="210" text-anchor="middle" font-size="9" fill="#1976D2">记忆注入</text>

  <!-- Memory -> Insights (data) -->
  <path d="M 290,590 L 450,590 L 450,565" stroke="#1976D2" stroke-width="1.5" fill="none" marker-end="url(#arrowBlue)"/>
  <text x="370" y="580" text-anchor="middle" font-size="9" fill="#1976D2">数据供给</text>

  <!-- Context -> Error Recovery -->
  <path d="M 320,495 L 290,495 L 290,655" stroke="#D32F2F" stroke-width="1.5" fill="none" marker-end="url(#arrowRed)"/>
  <text x="300" y="575" text-anchor="middle" font-size="9" fill="#D32F2F">压缩失败</text>

  <!-- Curator -> Insights -->
  <line x1="610" y1="490" x2="610" y2="655" stroke="#1976D2" stroke-width="1.5" marker-end="url(#arrowBlue)"/>
  <text x="620" y="575" text-anchor="middle" font-size="9" fill="#1976D2">指标数据</text>

  <!-- ====== LEGEND ====== -->
  <rect x="30" y="733" width="840" height="12" rx="3" fill="none"/>
</svg>
